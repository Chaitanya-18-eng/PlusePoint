<style>
        body {
            background-color: #f8fafc; /* Overriding for the specific 'Clean white background' request while keeping system tokens for components */
        }
        .neural-grid {
            background-image: radial-gradient(#4ade80 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.05;
        }
        .material-symbols-outlined {

<body class="flex flex-col min-h-screen items-center justify-center font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Decoration -->
<div class="fixed inset-0 neural-grid pointer-events-none"></div>
<div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary-container/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container/5 blur-[120px]"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white shadow-xl shadow-slate-200/50 mb-6 border border-slate-100">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="health_metrics">health_metrics</span>
</div>
<h1 class="font-headline font-extrabold text-slate-900 text-2xl tracking-tight uppercase mb-2">NEURAL HEALTH</h1>
<p class="font-label text-slate-500 text-xs tracking-widest uppercase">Healthcare Authority Access</p>
</div>
<!-- Login Card -->
<section class="bg-white/80 backdrop-blur-xl border border-white rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] p-8">
<form class="space-y-6">
<!-- ID Field -->
<div class="space-y-2">
<label class="font-label text-[10px] font-bold text-slate-400 uppercase tracking-widest block px-1" for="hca-id">ABDM ID or Hospital ID</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-300 group-focus-within:text-primary-container transition-colors" data-icon="badge">badge</span>
</div>
<input class="w-full bg-slate-50 border-0 border-b-2 border-slate-100 focus:border-primary-container focus:ring-0 text-slate-800 placeholder:text-slate-300 font-label tracking-wider transition-all pl-12 py-4 rounded-t-lg" id="hca-id" placeholder="ABDM ID or Hospital ID" type="text"/>
</div>
</div>
<!-- PIN Field -->
<div class="space-y-2">
<label class="font-label text-[10px] font-bold text-slate-400 uppercase tracking-widest block px-1" for="secure-pin">
                        Secure Pin
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-300 group-focus-within:text-primary-container transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full bg-slate-50 border-0 border-b-2 border-slate-100 focus:border-primary-container focus:ring-0 text-slate-800 placeholder:text-slate-300 font-label tracking-wider transition-all pl-12 py-4 rounded-t-lg" id="secure-pin" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action -->
<div class="pt-4">
<button class="w-full bg-[#4ADE80] hover:bg-[#3ce076] text-white font-headline font-bold py-4 rounded-xl transition-all shadow-lg shadow-green-200 active:scale-95 focus:ring-4 focus:ring-green-100 uppercase tracking-wide" type="submit">
                        Authorize Access
                    </button>
</div>
</form>
<!-- Navigation Switch -->
<div class="mt-8 pt-6 border-t border-slate-50 text-center">
<a class="font-label text-xs font-semibold text-slate-400 hover:text-primary-container transition-colors flex items-center justify-center gap-2" href="#">
<span class="material-symbols-outlined text-sm" data-icon="swap_horiz">swap_horiz</span>
                    Switch to User Login
                </a>
</div>
</section>
<!-- Footer Note -->
<footer class="mt-10 text-center space-y-6">
<div class="flex items-center justify-center gap-3">
<div class="h-[1px] w-8 bg-slate-200"></div>
<span class="font-label text-[9px] text-slate-400 tracking-[0.2em] uppercase">DPDP Act Compliant Secure Portal</span>
<div class="h-[1px] w-8 bg-slate-200"></div>
</div>
<div class="flex justify-center gap-4">
<img class="h-8 opacity-40 grayscale hover:grayscale-0 transition-all duration-500" data-alt="Official medical certification badge with neural network motif in soft green and grey tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCoO44fmWom_J-zBw9PMUBJiWuSoENdorNt-ETSHRcWTdBjUSZL_C5CjoF4hGOKh33NqkwQ4hrGg9W0_HVTcVyM57prQXL69TRFO1_u_f6rAJI5E1xG96YJ1Kb_cuiXpV1iS_Ds4GezqnIDkodvMR9xgJzUBMH4Zhj6B5Vf2AsLNll3-_bINYCaGIo5EqxOk2CGxiewlzy4B0byBWH3Y2JA0Ehfsm2jcUkNyvarXYcShcSwErFXuD0ePbMZd2xHoWnIRpMRSiiHkNbG"/>
<img class="h-8 opacity-40 grayscale hover:grayscale-0 transition-all duration-500" data-alt="DPDP data protection act compliance seal professional minimalist design" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgnBxKgkKLo-i522VIYgtTDJa6YpnSEF9QWAdbiJpg9OunW7Oid5OA5o0tJODfpIIXuyhVVRwVVpfm6gBSv-5pDkNSh9EheYiCBevmlBY-uTZhygdfkt8V5xqUd99Tf27wnmoOzT_9Im4Ah0lO1x3MAV_nKVBGshqyzdCUvy_u8cAyBGCoPPkfq1-tQVRw735TcYHnwfBYHERKQTHa6FAQ_k_Yrbr8rfauia1fxnqc6sS7n0bLh0IUSu76dMMCjTV1gIl1b_q17Ikv"/>
</div>
</footer>
</main>
<!-- Aesthetic Floating Elements -->
<div class="fixed top-20 left-20 hidden xl:block opacity-20 pointer-events-none">
<div class="w-48 h-48 bg-white border border-slate-100 rounded-xl p-4 shadow-sm flex flex-col gap-3">
<div class="h-2 w-12 bg-slate-100 rounded"></div>
<div class="h-2 w-24 bg-slate-50 rounded"></div>
<div class="mt-auto h-16 w-full bg-slate-50 rounded flex items-center justify-center">
<span class="material-symbols-outlined text-slate-200 text-3xl" data-icon="verified_user">verified_user</span>
</div>
</div>
</div>
<div class="fixed bottom-20 right-20 hidden xl:block opacity-20 pointer-events-none">
<div class="w-48 h-48 bg-white border border-slate-100 rounded-xl p-4 shadow-sm flex flex-col gap-3">
<div class="flex justify-between">
<div class="h-2 w-8 bg-primary-container/20 rounded"></div>
<div class="h-2 w-2 bg-primary-container/20 rounded-full"></div>
</div>
<div class="flex-1 flex items-end gap-1">
<div class="w-full h-[20%] bg-slate-50 rounded-t"></div>
<div class="w-full h-[40%] bg-slate-50 rounded-t"></div>
<div class="w-full h-[30%] bg-slate-100 rounded-t"></div>
<div class="w-full h-[60%] bg-primary-container/10 rounded-t"></div>
<div class="w-full h-[45%] bg-slate-50 rounded-t"></div>
</div>
</div>
</div>
