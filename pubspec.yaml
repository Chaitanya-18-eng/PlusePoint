name: pulsepoint
description: A new Flutter project for health surveillance.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.11.0
  cloud_firestore: ^5.6.3
  provider: ^6.1.2
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.3
  flutter_staggered_grid_view: ^0.7.0
  animations: ^2.0.11
  shared_preferences: ^2.3.3
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  permission_handler: ^12.0.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
